version: '3.8'

services:
  vector-mcp-mcp:
    image: ${VECTOR_MCP_MCP_IMAGE:?set-VECTOR_MCP_MCP_IMAGE-to-image@sha256-digest}
    container_name: vector-mcp-mcp
    hostname: vector-mcp-mcp
    restart: always
    env_file:
      - ../.env
    environment:
      - PYTHONUNBUFFERED=1
      - HOST=0.0.0.0
      - PORT=8000
      - TRANSPORT=streamable-http
      - AUTH_TYPE=${MCP_AUTH_TYPE:?set MCP_AUTH_TYPE for network transport}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
