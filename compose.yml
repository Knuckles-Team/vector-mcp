---
services:
  vector-agent-chromadb:
    # image: docker.io/knucklessg1/vector-mcp:latest
    build:
      context: . # Debug
      dockerfile: debug.Dockerfile
    container_name: vector-agent-chromadb
    hostname: vector-agent-chromadb
    command: [ "vector-agent" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      vector-mcp-chromadb:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    env_file:
      - .env
    environment:
      - "PYTHONUNBUFFERED=1"
      - "HOST=0.0.0.0"
      - "PORT=9023"
      - "MCP_URL=http://vector-mcp-chromadb:8023/mcp"
      - "PROVIDER=openai"
      - "LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}"
      - "LLM_API_KEY=${LLM_API_KEY:-llama}"
      - "MODEL_ID=${MODEL_ID:-qwen/qwen3-coder-next}"
      - "DEBUG=False"
      - "ENABLE_WEB_UI=True"
      - "ENABLE_OTEL=True"
      - "PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python"
    ports:
      - "9023:9023"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9023/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # PGVector + ParadeDB (Vector + BM25 Search)
  postgres:
    image: paradedb/paradedb:latest-pg16 # Changed to ParadeDB with PG16 support
    container_name: postgres
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vectordb
    ports:
      - "5432:5432"
    restart: always
    volumes:
      - ./mcp/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  vector-agent-postgres:
    # image: docker.io/knucklessg1/vector-mcp:latest
    build:
      context: . # Debug
      dockerfile: debug.Dockerfile
    container_name: vector-agent-postgres
    hostname: vector-agent-postgres
    command: [ "vector-agent" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      vector-mcp-postgres:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: always
    env_file:
      - .env
    environment:
      - "PYTHONUNBUFFERED=1"
      - "HOST=0.0.0.0"
      - "PORT=9024"
      - "MCP_URL=http://vector-mcp-postgres:8024/mcp"
      - "PROVIDER=openai"
      - "LLM_BASE_URL=${LLM_BASE_URL:-http://host.docker.internal:1234/v1}"
      - "LLM_API_KEY=${LLM_API_KEY:-llama}"
      - "MODEL_ID=${MODEL_ID:-qwen/qwen3-coder-next}"
      - "DEBUG=False"
      - "ENABLE_WEB_UI=True"
      - "ENABLE_OTEL=True"
    ports:
      - "9024:9024"
    healthcheck:
      test: [ "CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9024/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

